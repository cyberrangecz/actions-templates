name: Build & Publish NVD Cache

on:
  schedule:
    - cron: '0 2 * * *'   # nightly
  workflow_dispatch:

env:
  VERSION: "12.1.3"

jobs:
  build-nvd-cache:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Date Key
        id: date
        run: echo "date_key=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Download Dependency-Check CLI
        run: |
          curl -Ls "https://github.com/dependency-check/DependencyCheck/releases/download/v$VERSION/dependency-check-$VERSION-release.zip" --output dependency-check.zip
          unzip dependency-check.zip -d dc

      - name: Build NVD Database
        env:
          NVD_API_KEY: ${{ secrets.NVD_API }}
        run: |
          ./bin/dependency-check.sh --updateonly --nvdApiKey $NVD_API_KEY

      - name: Upload NVD Cache as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvd-cache-${{ steps.date.outputs.date_key }}
          path: ./data
          retention-days: 3